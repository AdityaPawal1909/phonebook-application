<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Manager</title>
    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container mt-5">
        <div class="card shadow-lg p-4">
            <!-- Heading -->
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="m-0">
                    📇 Contact Manager
                </h2>
                <button id="themeBtn" class="btn btn-dark">
                    🌙 Dark Mode
                </button>
            </div>
            <!-- Search -->
            <input type="text" id="search" class="form-control mb-4" placeholder="🔍 Search Contact...">
            <!-- Contact Form -->
            <div class="row">
                <div class="col-md-5 mb-3">
                    <input type="text" id="name" class="form-control" placeholder="Enter Name">
                </div>
                <div class="col-md-5 mb-3">
                    <input type="text" id="number" class="form-control" placeholder="Enter Contact Number">
                </div>
                <div class="col-md-2 mb-3">
                    <button id="saveBtn" class="btn btn-primary w-100">
                        Save
                    </button>
                </div>
            </div>
            <!-- Contact Counter -->
            <div class="mb-3">
                <strong>Total Contacts :</strong>
                <span id="contactCount">
                    0
                </span>
            </div>
            <!-- Contact Cards -->
            <div id="contactList">
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
